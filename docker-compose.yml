services:
  matchmaking-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - HTTP_PORTS=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/matchmaking/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s